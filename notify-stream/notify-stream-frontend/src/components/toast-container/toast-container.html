<div class="fixed top-20 right-4 z-[60] flex flex-col gap-2">
    @for(notify of toastNotify(); track notify.id){
    <div class="bg-white shadow-xl rounded-lg p-3 w-72 border-l-8" [class.border-red-500]="notify.type === 'Error'"
        [class.border-yellow-500]="notify.type === 'Warning'" [class.border-blue-500]="notify.type === 'Info'">
        <div class="flex justify-between items-start toast-enter">
            <div>
                <p class="font-bold text-sm">{{notify.title}}</p>
                <p class="text-xs text-gray-500">{{notify.message}}</p>
            </div>
            <span class="material-icons cursor-pointer text-xl" (click)="closeToast(notify.id)">close</span>
        </div>
        <div class="progress-bar -mx-3 -mb-3" [class.bg-red-500]="notify.type === 'Error'"
            [class.bg-yellow-500]="notify.type === 'Warning'" [class.bg-blue-500]="notify.type === 'Info'">
        </div>
    </div>
    }
</div>
